  let allImages = [];

  const cards = new Map();

  const CELL = 220;

  const PRELOAD_CELLS = 1;

  const loading = document.getElementById('loading');

  function updateCanvasTransform() {
    canvas.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
  }

  function queueRender() {
    if (renderQueued) return;
    renderQueued = true;
    requestAnimationFrame(() => {
      renderQueued = false;
      render();
    });
  }

  // ── Load images from Firebase ────────────────
  async function loadImages() {
    const snapshot = await getDocs(collection(db, 'images'));
    snapshot.forEach(doc => allImages.push(doc.data()));
    loading.style.display = 'none';
    render();
  }

  // ── Get a deterministic image for a grid cell ─
  function getImageFor(col, row) {
    if (!allImages.length) return null;
    const seed = Math.abs((col * 73856093) ^ (row * 19349663)) % allImages.length;
    return allImages[seed];
  }

  // ── Render visible cells ─────────────────────
  function render() {
    const W = wrap.clientWidth;
    const H = wrap.clientHeight;

    const startCol = Math.floor(-offsetX / STEP) - PRELOAD_CELLS;
    const endCol = startCol + Math.ceil(W / STEP) + (PRELOAD_CELLS * 2);
    const startRow = Math.floor(-offsetY / STEP) - PRELOAD_CELLS;
    const endRow = startRow + Math.ceil(H / STEP) + (PRELOAD_CELLS * 2);
    const needed = new Set();

    for (let col = startCol; col <= endCol; col++) {
      for (let row = startRow; row <= endRow; row++) {
        const key = `${col},${row}`;
        needed.add(key);
        if (cards.has(key)) continue;

        const img = getImageFor(col, row);
        if (!img) continue;

        const card = document.createElement('div');
        card.className = 'img-card';
        card.dataset.key = key;
        card.style.left = (col * STEP) + 'px';
        card.style.top = (row * STEP) + 'px';
        card.style.width = CELL + 'px';
        card.style.height = CELL + 'px';

        const el = document.createElement('img');
        el.src = img.url;
        el.alt = img.name || '';
        el.draggable = false;
        el.loading = 'lazy';
        el.decoding = 'async';
        card.appendChild(el);
        canvas.appendChild(card);
        cards.set(key, card);
      }
    }

    updateCanvasTransform();

    cards.forEach((el, key) => {
      if (needed.has(key)) return;
      el.remove();
      cards.delete(key);
    });

  }

  uploadBtn.addEventListener('click', openPanel);

    const file = e.target.files[0];

    const storageRef = ref(storage, `images/${Date.now()}_${file.name}`);
    const uploadTask = uploadBytesResumable(storageRef, file);

    progressWrap.style.display = 'block';
    statusEl.textContent = 'Uploading…';

    uploadTask.on('state_changed',
      snapshot => {
        const pct = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
        progressBar.style.width = pct + '%';
      },
      error => {
        statusEl.textContent = 'Upload failed: ' + error.message;
      },
      async () => {
        const url = await getDownloadURL(uploadTask.snapshot.ref);

        allImages.push(newImage);

        statusEl.textContent = 'Upload complete!';
        setTimeout(closePanel, 1200);
      }
    );
  });
