
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KBH Arkiv</title>
  <link rel="stylesheet" href="./styles/collection.css" />
</head>
<body>

<div id="topbar">
  <div id="brand">
    KBH <span class="sub">collection</span>
  </div>
  <button id="burger-btn" aria-label="Open menu" type="button">
    <span class="burger-lines">
      <span class="burger-line"></span>
      <span class="burger-line"></span>
      <span class="burger-line"></span>
    </span>
  </button>
</div>

<div id="menu-overlay"></div>

<div id="sidebar">
  <div class="sidebar-section">
    <button id="upload-btn" class="menu-item" type="button">
      <span class="icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 16V4"></path>
          <path d="M8 8l4-4 4 4"></path>
          <path d="M20 20H4"></path>
        </svg>
      </span>
      <span class="label">Upload</span>
    </button>
  </div>

  <div class="sidebar-section">
    <button class="menu-item" type="button" id="menu-filter" aria-label="Filter">
      <span class="icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 21v-7"></path>
          <path d="M4 10V3"></path>
          <path d="M12 21v-9"></path>
          <path d="M12 8V3"></path>
          <path d="M20 21v-5"></path>
          <path d="M20 12V3"></path>
          <path d="M2 10h4"></path>
          <path d="M10 8h4"></path>
          <path d="M18 12h4"></path>
        </svg>
      </span>
      <span class="label">Filtrér</span>
    </button>

    <button class="menu-item" type="button" id="menu-search" aria-label="Search">
      <span class="icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="M21 21l-4.3-4.3"></path>
        </svg>
      </span>
      <span class="label">Søg</span>
    </button>
  </div>
  <div class="sidebar-section">
    <button class="menu-item" type="button" id="menu-api" aria-label="API">
      <span class="label">&lt;API/&gt;</span>
    </button>

    <button class="menu-item" type="button" id="menu-about" aria-label="Om projektet">
      <span class="label">OM PROJEKTET</span>
    </button>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-subheader">Din profil</div>
    <button class="menu-item" type="button" id="menu-saved" aria-label="Saved images">
      <span class="icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
        </svg>
      </span>
      <span class="label">Gemte billeder</span>
    </button>
  </div>

  <div class="sidebar-footer">
    En fælles åbning af bibliotek og museumstanker i København. (Placeholder text)
  </div>
</div>

<div id="overlay"></div>

<div id="upload-panel">
  <h2>Upload image</h2>
  <label for="file-input">
    Click to choose an image
  </label>
  <input type="file" id="file-input" accept="image/*" />
  <div id="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>
  <p id="status"></p>
  <button id="close-btn">Close</button>
</div>

<div id="canvas-wrap">
  <div id="canvas"></div>
  <div id="loading">Loading images...</div>
  <div id="hint">Click and drag to explore</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script type="module" src="./scripts/collection.js"></script>
</body>
</html>
