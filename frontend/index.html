
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KBH Arkiv</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pavanam&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles/collection.css?v=6" />
</head>
<body>

<div id="topbar">
  <button id="burger-btn" aria-label="Open menu" type="button">
    <img src="./icons/burgermenu-icon.svg" alt="" />
  </button>
</div>

<div id="menu-overlay"></div>

<div id="sidebar">
  <div class="sidebar-section menu-group menu-group-1">
    <button id="upload-btn" class="menu-item" type="button">
      <span class="icon" aria-hidden="true">
        <img src="./icons/upload-icon.svg" alt="" width="16" height="15" />
      </span>
      <span class="label">Upload</span>
    </button>
    <button class="menu-item" type="button" id="menu-filter" aria-label="Filter">
      <span class="icon" aria-hidden="true">
        <img src="./icons/filtrer-icon.svg" alt="" width="17" height="15" />
      </span>
      <span class="label">Filtrér</span>
    </button>

    <button class="menu-item" type="button" id="menu-search" aria-label="Search">
      <span class="icon" aria-hidden="true">
        <img src="./icons/søg-icon.svg" alt="" width="13" height="15" />
      </span>
      <span class="label">Søg</span>
    </button>
  </div>

  <div class="sidebar-section menu-group menu-group-2">
    <button class="menu-item" type="button" id="menu-api" aria-label="API">
      <span class="label">BRUG VORES &lt;API/&gt;</span>
    </button>

    <button class="menu-item" type="button" id="menu-about" aria-label="Om projektet">
      <span class="label">OM PROJEKTET</span>
    </button>
  </div>

  <div class="sidebar-section menu-group menu-group-3">
    <button class="menu-item" type="button" id="menu-profile" aria-label="Din profil">
      <span class="label">Din profil</span>
    </button>
    <button class="menu-item" type="button" id="menu-saved" aria-label="Saved images">
      <span class="icon" aria-hidden="true">
        <img src="./icons/gem-icon.svg" alt="" width="16" height="16" />
      </span>
      <span class="label">Gemte billeder</span>
    </button>
  </div>

  <div class="sidebar-footer">
    En fælles åben billedesamling af Københavns detaljer skabt af jer.
  </div>

  <div class="sidebar-logos" aria-label="Partner logos">
    <img src="./logos/københavnsmuseum-logo.png" alt="Københavns Museum" />
    <img src="./logos/københavnskommune-logo.png" alt="Københavns Kommune" />
    <img src="./logos/detkongeligebibliotek-logo.png" alt="Det Kongelige Bibliotek" />
  </div>
</div>

<div id="overlay"></div>

<div id="upload-panel">
  <h2>Upload image</h2>
  <label for="file-input">
    Click to choose an image
  </label>
  <input type="file" id="file-input" accept="image/*" />
  <div id="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>
  <p id="status"></p>
  <button id="close-btn">Close</button>
</div>

<div id="canvas-wrap">
  <div id="canvas"></div>
  <div id="loading">Loading images...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://unpkg.com/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script type="module" src="./scripts/collection.js?v=5"></script>
</body>
</html>
