
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="color-scheme" content="light" />
  <title>KBH Arkiv</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pavanam&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles/collection.css?v=34" />
</head>
<body>

<div id="topbar">
  <button id="burger-btn" aria-label="Open menu" type="button">
    <img src="./icons/burgermenu-icon.svg" alt="" />
  </button>
</div>

<div id="menu-overlay"></div>

<div id="sidebar">
  <div class="sidebar-section menu-group menu-group-1">
    <button id="upload-btn" class="menu-item" type="button">
      <span class="icon" aria-hidden="true">
        <img src="./icons/upload-icon.svg" alt="" width="16" height="15" />
      </span>
      <span class="label">Upload</span>
    </button>
    <button class="menu-item" type="button" id="menu-filter" aria-label="Filter">
      <span class="icon" aria-hidden="true">
        <img src="./icons/filtrer-icon.svg" alt="" width="17" height="15" />
      </span>
      <span class="label">Filtrér</span>
    </button>

    <button class="menu-item" type="button" id="menu-search" aria-label="Search">
      <span class="icon" aria-hidden="true">
        <img src="./icons/søg-icon.svg" alt="" width="13" height="15" />
      </span>
      <span class="label">Søg</span>
    </button>
  </div>

  <div class="sidebar-section menu-group menu-group-2">
    <button class="menu-item" type="button" id="menu-api" aria-label="API">
      <span class="label">BRUG VORES &lt;API/&gt;</span>
    </button>

    <button class="menu-item" type="button" id="menu-about" aria-label="Om projektet">
      <span class="label">OM PROJEKTET</span>
    </button>
  </div>

  <div class="sidebar-section menu-group menu-group-3">
    <button class="menu-item" type="button" id="menu-profile" aria-label="Din profil">
      <span class="label">Din profil</span>
    </button>
    <button class="menu-item" type="button" id="menu-saved" aria-label="Saved images">
      <span class="icon" aria-hidden="true">
        <img src="./icons/gem-icon.svg" alt="" width="16" height="16" />
      </span>
      <span class="label">Gemte billeder</span>
    </button>
  </div>

  <div class="sidebar-footer">
    En fælles åben billedesamling af Københavns detaljer.
  </div>

  <div class="sidebar-logos" aria-label="Partner logos">
    <img src="./logos/københavnsmuseum-logo.png" alt="Københavns Museum" />
    <img src="./logos/københavnskommune-logo.png" alt="Københavns Kommune" />
    <img src="./logos/detkongeligebibliotek-logo.png" alt="Det Kongelige Bibliotek" />
  </div>
</div>

<div id="overlay"></div>

<div id="upload-panel">
  <h2>Upload image</h2>
  <label for="file-input">
    Click to choose an image
  </label>
  <input type="file" id="file-input" accept="image/*" />
  <div id="progress-bar-wrap">
    <div id="progress-bar"></div>
  </div>
  <p id="status"></p>
  <button id="close-btn">Close</button>
</div>

<div id="search-panel" aria-hidden="true">
  <div class="search-bar">
    <img class="search-bar-icon" src="./icons/søg-icon.svg" alt="" width="13" height="15" />
    <div class="search-field">
      <input
        type="search"
        id="search-input"
        placeholder="Hvad leder du efter?"
        autocomplete="off"
        aria-label="Hvad leder du efter?"
      />
    </div>
    <button type="button" id="search-close" class="search-close" aria-label="Luk søgning">×</button>
  </div>
  <p id="search-hint" class="search-hint" hidden></p>
</div>

<div id="filter-panel" aria-hidden="true">
  <button type="button" id="filter-close" class="filter-close" aria-label="Luk filter">×</button>

  <section class="filter-section">
    <h3 class="filter-heading">BYDELE</h3>
    <div class="filter-grid filter-grid--districts" id="filter-districts"></div>
  </section>

  <section class="filter-section">
    <h3 class="filter-heading">FARVER</h3>
    <div class="filter-grid filter-grid--colors" id="filter-colors"></div>
  </section>

  <section class="filter-section filter-section--years">
    <h3 class="filter-heading">ÅRSTAL</h3>
    <div class="filter-years">
      <input type="number" id="filter-year-from" class="filter-year-input" min="1850" max="2100" step="1" aria-label="Fra år" />
      <span class="filter-year-sep" aria-hidden="true">—</span>
      <input type="number" id="filter-year-to" class="filter-year-input" min="1850" max="2100" step="1" aria-label="Til år" />
    </div>
  </section>
</div>

<div id="image-detail" class="image-detail" aria-hidden="true" hidden>
  <aside id="image-detail-panel" class="image-detail-panel">
    <dl class="image-detail-meta">
      <div class="image-detail-meta-row">
        <dt>BYDEL</dt>
        <dd id="image-detail-district"></dd>
      </div>
      <div class="image-detail-meta-row">
        <dt>ÅRSTAL</dt>
        <dd id="image-detail-year"></dd>
      </div>
      <div class="image-detail-meta-row">
        <dt>FARVER</dt>
        <dd id="image-detail-colors"></dd>
      </div>
      <div class="image-detail-meta-row image-detail-meta-row--caption">
        <dt>BESKRIVELSE</dt>
        <dd id="image-detail-caption"></dd>
      </div>
    </dl>
  </aside>
</div>

<button type="button" id="image-detail-close" class="image-detail-close" aria-label="Luk billede" hidden>×</button>

<div id="canvas-wrap">
  <div id="canvas"></div>
  <div id="canvas-empty" class="canvas-empty" hidden></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://unpkg.com/heic2any@0.0.4/dist/heic2any.min.js"></script>
<script type="module" src="./scripts/collection.js?v=52"></script>
</body>
</html>
